{% extends 'base.html' %}

{% block title %}Logged out - MyTrip{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 text-center p-6 bg-white rounded shadow">
  <h1 class="text-2xl font-semibold mb-4">You have been logged out</h1>
  <p class="text-gray-600 mb-6">Please choose how you'd like to sign in again:</p>
  <div class="flex justify-center gap-3">
    <a href="{% url 'login' %}" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Login as User</a>
    <a href="{% url 'admin:login' %}" class="px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-900">Login as Admin</a>
  </div>
  <p class="mt-6 text-sm text-gray-500"><a href="{% url 'MyTrip' %}" class="underline">Return to homepage</a></p>
</div>

{% endblock %}
