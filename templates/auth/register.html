{% extends 'base.html' %}

{% block title %}Register - MyTrip{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-2xl">
  <div class="p-6">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Create an account</h2>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700">Full name</label>
        <input type="text" name="name" value="{{ name|default:'' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary" placeholder="Your full name">
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" value="{{ email|default:'' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary" placeholder="you@example.com" required>
      </div>
      <div class="mb-3 grid grid-cols-1 gap-3 md:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <input type="password" name="password2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary" required>
        </div>
      </div>

      <div class="flex items-center justify-between mt-4">
        <button type="submit" class="inline-flex items-center px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90">Register</button>
        <a href="{% url 'login' %}" class="text-sm text-gray-600 hover:underline">Already have an account? Login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
