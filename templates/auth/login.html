{% extends 'base.html' %}

{% block title %}Login - MyTrip{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-2xl">
  <div class="p-6">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Sign in to your account</h2>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary" required>
      </div>

      <div class="flex items-center justify-between mb-4">
        <label class="inline-flex items-center">
          <input type="checkbox" name="remember" class="mr-2">
          <span class="text-sm text-gray-700">Remember me</span>
        </label>
        <a href="#" class="text-sm text-gray-600 hover:underline">Forgot password?</a>
      </div>

    <div class="flex items-center justify-between">
        <button type="submit" class="inline-flex items-center px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90">Login</button>
        <a href="{% url 'register' %}" class="text-sm text-gray-600 hover:underline">Create an account</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
