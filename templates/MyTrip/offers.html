{% extends 'base.html' %}

{% block title %}Offers - MyTrip{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-4">Offers & Deals</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for o in offers %}
    <div class="bg-white rounded-lg shadow p-4">
      <h3 class="font-semibold">{{ o.title }}</h3>
      <p class="text-sm text-gray-600">{{ o.destination }}</p>
      <div class="mt-2 text-lg font-bold">৳{{ o.price }}</div>
      <div class="mt-3"><a href="{% url 'package_detail' o.pk %}" class="text-primary hover:underline">View</a></div>
    </div>
  {% empty %}
    <p>No offers at this time.</p>
  {% endfor %}
</div>
{% endblock %}
