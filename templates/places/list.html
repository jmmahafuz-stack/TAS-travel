{% extends 'base.html' %}

{% block title %}Places - MyTrip{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-4">Places to visit</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for place in places %}
    <div class="bg-white rounded-lg shadow p-4">
      <h3 class="font-semibold">{{ place.name }}</h3>
      <p class="text-sm text-gray-600">{{ place.city }}</p>
      <p class="mt-2 text-sm">{{ place.description|truncatewords:20 }}</p>
      <div class="mt-3">
        <a href="{% url 'place_detail' place.pk %}" class="text-primary hover:underline">View</a>
      </div>
    </div>
  {% empty %}
    <p>No places found.</p>
  {% endfor %}
</div>
{% endblock %}
