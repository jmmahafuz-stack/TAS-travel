{% extends 'admin_base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
  <h1 class="text-2xl font-bold mb-4">{{ title }}</h1>
  <form method="post" enctype="multipart/form-data" class="bg-white p-4 rounded shadow">
    {% csrf_token %}
    <div class="grid grid-cols-1 gap-4">
      {{ form.as_p }}
    </div>
    <div class="mt-4">
      <button type="submit" class="px-3 py-2 bg-primary text-white rounded">Save</button>
      <a href="{% url 'dashboard-manage-hotels' %}" class="ml-2 text-gray-600">Cancel</a>
    </div>
  </form>
{% endblock %}
