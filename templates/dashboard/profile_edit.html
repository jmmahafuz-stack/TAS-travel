{% extends 'admin_base.html' %}

{% block title %}Profile Edit - MyTrip Admin{% endblock %}

{% block admin_title %}Profile Edit{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded shadow p-6">
  <h2 class="text-lg font-semibold mb-4">Edit Profile</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="block text-sm font-medium">First name</label>
      <input type="text" name="first_name" value="{{ user_obj.first_name }}" class="mt-1 block w-full rounded-md border-gray-300 p-2">
    </div>
    <div class="mb-3">
      <label class="block text-sm font-medium">Last name</label>
      <input type="text" name="last_name" value="{{ user_obj.last_name }}" class="mt-1 block w-full rounded-md border-gray-300 p-2">
    </div>

    <hr class="my-4">

    <div class="mb-3">
      <label class="block text-sm font-medium">Current password (required to change password)</label>
      <input type="password" name="old_password" class="mt-1 block w-full rounded-md border-gray-300 p-2">
    </div>
    <div class="mb-3">
      <label class="block text-sm font-medium">New password</label>
      <input type="password" name="new_password1" class="mt-1 block w-full rounded-md border-gray-300 p-2">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Confirm new password</label>
      <input type="password" name="new_password2" class="mt-1 block w-full rounded-md border-gray-300 p-2">
    </div>

    <div class="flex gap-3">
      <button type="submit" class="px-4 py-2 bg-primary text-white rounded">Save changes</button>
      <a href="{% url 'admin:index' %}" class="px-4 py-2 border rounded">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
