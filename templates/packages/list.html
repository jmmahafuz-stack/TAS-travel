{% extends 'base.html' %}

{% block title %}Packages - MyTrip{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-4">Travel Packages</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for p in packages %}
    <div class="bg-white rounded-lg shadow p-4">
      <h3 class="font-semibold">{{ p.title }}</h3>
      <p class="text-sm text-gray-600">{{ p.destination }}</p>
      <p class="mt-2">{{ p.description|truncatewords:20 }}</p>
      <div class="mt-3 flex items-center justify-between">
        <div class="text-lg font-bold">৳{{ p.price }}</div>
        <a href="{% url 'package_detail' p.pk %}" class="text-primary hover:underline">View</a>
      </div>
    </div>
  {% empty %}
    <p>No packages yet.</p>
  {% endfor %}
</div>
{% endblock %}
