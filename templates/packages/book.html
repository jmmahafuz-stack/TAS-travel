{% extends 'base.html' %}

{% block title %}Book {{ package.title }} - MyTrip{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow p-4 max-w-md">
  <h1 class="text-xl font-semibold">Book {{ package.title }}</h1>
  <p class="text-sm text-gray-600">Price: ৳{{ package.price }}</p>
  <form method="post">
    {% csrf_token %}
    <div class="mt-4">
      <button class="px-4 py-2 bg-primary text-white rounded-md">Confirm Booking</button>
      <a href="{% url 'package_detail' package.pk %}" class="ml-2 text-gray-600">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
